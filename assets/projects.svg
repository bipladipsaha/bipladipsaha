<svg viewBox="0 0 1000 370" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fifteen projects by Bipladip Saha">
  <style>
    :root { --ink:#000000; --paper:#FFFFFF; }
    @media (prefers-color-scheme:dark) { :root { --ink:#FFFFFF; --paper:#000000; } }
    .mono { font-family:ui-monospace,"SFMono-Regular","SF Mono",Menlo,Consolas,"Liberation Mono",monospace; }
    .row { opacity:0; animation:reveal .55s cubic-bezier(.2,.7,.2,1) forwards; }
    .rule { stroke:var(--ink); stroke-width:1; }
    .title { fill:var(--ink); font-size:17px; font-weight:700; letter-spacing:.8px; }
    .copy { fill:var(--ink); font-size:12px; }
    .meta { fill:var(--ink); font-size:11px; letter-spacing:.4px; }
    @keyframes reveal { from { opacity:0; } to { opacity:1; } }
    .r1{animation-delay:.05s}.r2{animation-delay:.10s}.r3{animation-delay:.15s}.r4{animation-delay:.20s}.r5{animation-delay:.25s}
    .r6{animation-delay:.30s}.r7{animation-delay:.35s}.r8{animation-delay:.40s}.r9{animation-delay:.45s}.r10{animation-delay:.50s}
    .r11{animation-delay:.55s}.r12{animation-delay:.60s}.r13{animation-delay:.65s}.r14{animation-delay:.70s}.r15{animation-delay:.75s}
    @media (prefers-reduced-motion:reduce) { .row { animation:none; opacity:1; } }
    :root { --ink:#000000; --paper:#FFFFFF; }
  </style>

  <g class="mono">
    <g class="row r1" transform="translate(0 20)">
      <text class="title" x="48" y="24">01 / IOT ALERT SYSTEM</text>
      <text class="copy" x="48" y="49">Real-time IoT system for live location tracking and motion detection using ESP32 and GPS.</text>
      <text class="copy" x="48" y="68">Integrates an accelerometer for impact-based alerts via GSM SMS and Firebase cloud sync.</text>
      <text class="meta" x="48" y="87">ESP32 · GPS NEO-6M · ACCELEROMETER · GSM MODULE · FIREBASE</text>
      <line class="rule" x1="48" y1="104" x2="952" y2="104"/>
    </g>
    <g class="row r2" transform="translate(0 130)">
      <text class="title" x="48" y="24">02 / SIGN LANGUAGE CONVERTER</text>
      <text class="copy" x="48" y="49">Real-time word-based sign language recognition system using Raspberry Pi and camera input.</text>
      <text class="copy" x="48" y="68">Uses MediaPipe for hand landmark detection, converting gestures to speech with a custom ML model.</text>
      <text class="meta" x="48" y="87">RASPBERRY PI · PYTHON · OPENCV · MEDIAPIPE · MACHINE LEARNING · TTS</text>
      <line class="rule" x1="48" y1="104" x2="952" y2="104"/>
    </g>
    <g class="row r3" transform="translate(0 240)">
      <text class="title" x="48" y="24">03 / SMART INVENTORY SYSTEM</text>
      <text class="copy" x="48" y="49">Structured inventory management system for efficient stock tracking and real-time updates.</text>
      <text class="copy" x="48" y="68">Designed robust backend logic with database integration for automated validation and accuracy.</text>
      <text class="meta" x="48" y="87">PYTHON · MONGODB · DATABASE DESIGN · BACKEND ARCHITECTURE</text>
      <line class="rule" x1="48" y1="104" x2="952" y2="104"/>
    </g>
    </g>
</svg>
