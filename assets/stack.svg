<svg viewBox="0 0 1000 174" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack — languages, web, concepts, machine learning, tools">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --accent:#0284c7; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --accent:#0284c7; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .6s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(6px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.1s} .a2{animation-delay:.2s} .a3{animation-delay:.3s} .a4{animation-delay:.4s} .a5{animation-delay:.5s} .a6{animation-delay:.6s} .a7{animation-delay:.7s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent:#0284c7; --node-bg: #FFFFFF; --core-bg: #FFFFFF; --ghost: #000000; }
  </style>

  <line x1="138" y1="8" x2="138" y2="166" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <text class="mono rise a1" x="48" y="32"  font-size="12" fill="var(--muted)" letter-spacing="2">LANGUAGES</text>
  <text class="mono rise a1" x="154" y="32"  font-size="15" fill="var(--bone)">Python · Java · C · JavaScript</text>

  <text class="mono rise a2" x="48" y="64"  font-size="12" fill="var(--muted)" letter-spacing="2">WEB</text>
  <text class="mono rise a2" x="154" y="64"  font-size="15" fill="var(--bone)">HTML · CSS</text>

  <text class="mono rise a3" x="48" y="96"  font-size="12" fill="var(--muted)" letter-spacing="2">CONCEPTS</text>
  <text class="mono rise a3" x="154" y="96"  font-size="15" fill="var(--bone)">Data Structures &amp; Algorithms · OOP</text>

  <text class="mono rise a4" x="48" y="128" font-size="12" fill="var(--muted)" letter-spacing="2">AI/ML</text>
  <text class="mono rise a4" x="154" y="128" font-size="15" fill="var(--bone)">Scikit-learn · Data Preprocessing</text>

  <text class="mono rise a5" x="48" y="160" font-size="12" fill="var(--muted)" letter-spacing="2">TOOLS</text>
  <text class="mono rise a5" x="154" y="160" font-size="15" fill="var(--bone)">Jupyter Notebook · Google Colab · Git · Firebase</text>
</svg>
